{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}ДДС{% endblock %} | Движение денежных средств</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="{% static 'css/style.css' %}" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container-fluid">
      <a class="navbar-brand" href="{% url 'dashboard' %}">ДДС</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Меню">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav">
          <li class="nav-item">
            <a class="nav-link" href="{% url 'dashboard' %}">Главная</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'record_create' %}">Новая запись</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="{% url 'references' %}">Справочники</a>
          </li>
          {% if user.is_authenticated %}
          <li class="nav-item ms-auto">
            <form action="{% url 'logout' %}" method="post" class="d-inline">
              {% csrf_token %}
              <button type="submit" class="nav-link btn btn-link border-0 p-0">Выход ({{ user.username }})</button>
            </form>
          </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>

  <main class="container-fluid py-4">
    <div id="toast-container" class="toast-container position-fixed top-0 end-0 p-3"></div>
    {% block content %}{% endblock %}
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  {% block extra_js %}{% endblock %}
</body>
</html>
